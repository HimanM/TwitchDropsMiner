name: Build

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - 'README.md'
      - 'manual.txt'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'manual.txt'
      - 'LICENSE'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  USE_UPX: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Validate language files
        run: |
          failed=()
          for file in "lang/"*.json; do
            if err="$(python -m json.tool "${file}" 2>&1 >/dev/null)"; then
              echo "[OK] ${file}"
            else
              echo "[ERROR] ${file} ${err}"
              failed+=("${file}")
            fi
          done
          if [ "${#failed[@]}" -gt 0 ]; then
            echo -e "\nFailed to validate the following language file(s): ${failed[@]}"
            exit 1
          fi

      - name: Install TUI dependencies
        run: |
          python3 -m pip install -r requirements-tui.txt

      - name: Run TUI tests
        run: |
          python3 -m unittest discover -s tests -p "test_frontend_injection.py" -v
          python3 -m unittest discover -s tests -p "test_tui*.py" -v

      - name: Compile TUI modules
        run: |
          python3 -m compileall -q tui tdminer.py network/twitch.py core/utils.py

  web:
    name: Linux Web UI
    runs-on: ubuntu-latest
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install web dependencies
        run: |
          python3 -m pip install -r requirements-web.txt
          npm ci --prefix web/frontend

      - name: Build web frontend
        run: |
          npm run build --prefix web/frontend
          git diff --exit-code -- web/static

      - name: Test web server and installer
        run: |
          python3 -m unittest discover -s tests -p "test_web*.py" -v
          python3 -m unittest discover -s tests -p "test_installer.py" -v
          python3 -m compileall -q web tdminer_web.py tui/manager.py
          bash -n scripts/install.sh

      - name: Upload install scripts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: DropForge.Install.Scripts
          path: scripts/install.sh

  windows:
    name: Windows
    runs-on: windows-latest
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: |
          Add-Content $env:GITHUB_OUTPUT "sha_short=$(git rev-parse --short HEAD)"

      - name: Append git revision to project version
        run: |
          (Get-Content version.py) `
          -Replace '^__version__\s*=\s*"[^"]+', "`$0.${{steps.vars.outputs.sha_short}}" |`
          Out-File version.py

      # Ensure Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install project dependencies
        run: |
          python3 -m pip install wheel
          python3 -m pip install -r requirements.txt

      # TODO: Consider using https://github.com/crazy-max/ghaction-upx
      # or some other way of keeping the download link up to date in the future
      - name: Install UPX
        if: env.USE_UPX == 'true'
        run: |
          Invoke-WebRequest -Uri https://github.com/upx/upx/releases/download/v5.0.2/upx-5.0.2-win64.zip -OutFile (Join-Path $env:Temp upx.zip)
          Expand-Archive -LiteralPath (Join-Path $env:Temp upx.zip) -DestinationPath $env:Temp
          Move-Item -Path (Join-Path $env:Temp upx-*) -Destination (Join-Path $env:Temp upx)
          Add-Content $env:GITHUB_PATH (Join-Path $env:Temp upx)

      - name: Install PyInstaller
        run: |
          python3 -m pip install pyinstaller

      - name: Create portable executable
        run: |
          pyinstaller build.spec

      - name: Create release folder
        run: |
          $FolderName = 'DropForge'
          New-Item $FolderName -ItemType Directory
          Copy-Item dist\*.exe $FolderName
          Copy-Item manual.txt $FolderName
          Compress-Archive -Path $FolderName -DestinationPath DropForge.Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: DropForge.Windows
          path: DropForge.Windows.zip

  macos:
    name: macOS
    runs-on: macos-latest
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Append git revision to project version
        run: |
          sed -i '' -E "s/^(__version__\s*=\s*\"[^\"]+)/\1.${{steps.vars.outputs.sha_short}}/" version.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install project dependencies
        run: |
          python3 -m pip install wheel
          python3 -m pip install -r requirements.txt

      - name: Install PyInstaller
        run: |
          python3 -m pip install pyinstaller

      - name: Create portable executable
        run: |
          pyinstaller build.spec --noconfirm

      - name: Create release folder and Zip
        run: |
          FOLDER="DropForge"
          mkdir -p "$FOLDER"
          cp -r "dist/DropForge.app" "$FOLDER/"
          cp manual.txt "$FOLDER/"
          zip -r DropForge.MacOS.zip "$FOLDER"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: DropForge.MacOS
          path: DropForge.MacOS.zip

  macos-tui:
    name: macOS TUI
    runs-on: macos-latest
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install TUI dependencies
        run: |
          python3 -m pip install -r requirements-tui.txt
          python3 -m pip install pyinstaller

      - name: Create tdminer executable
        run: |
          pyinstaller build_tui.spec --noconfirm

      - name: Create TUI release archive
        run: |
          mkdir -p tdminer
          cp dist/tdminer tdminer/
          zip -r DropForge.TUI.MacOS.zip tdminer

      - name: Upload TUI build artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: DropForge.TUI.MacOS
          path: DropForge.TUI.MacOS.zip

  linux-tui:
    name: Linux TUI (${{matrix.arch}})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{matrix.runner}}
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install TUI dependencies
        run: |
          python3 -m pip install -r requirements-tui.txt
          python3 -m pip install pyinstaller

      - name: Create tdminer executable
        run: |
          pyinstaller build_tui.spec --noconfirm

      - name: Create TUI release archive
        run: |
          mkdir -p tdminer
          cp dist/tdminer tdminer/
          zip -r DropForge.TUI.Linux-${{matrix.arch}}.zip tdminer

      - name: Upload TUI build artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: DropForge.TUI.Linux-${{matrix.arch}}
          path: DropForge.TUI.Linux-${{matrix.arch}}.zip

  linux-pyinstaller:
    name: Linux (PyInstaller) (${{matrix.arch}})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{matrix.runner}}
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Append git revision to project version
        run: |
          sed -ri "s/^__version__\s*=\s*\"[^\"]+/\0.${{steps.vars.outputs.sha_short}}/" version.py

      # Ensure Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install system dependencies
        run: |
          sudo sed -i -e 's|http://archive.ubuntu.com|https://archive.ubuntu.com|g' -e 's|http://ports.ubuntu.com|https://ports.ubuntu.com|g' -e 's|http://security.ubuntu.com|https://security.ubuntu.com|g' /etc/apt/sources.list
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y libgirepository1.0-dev gir1.2-ayatanaappindicator3-0.1 libayatana-appindicator3-1 python3-tk

      - name: Install project dependencies
        run: |
          python3 -m pip install wheel
          python3 -m pip install -r requirements.txt

      - name: Install PyInstaller
        run: |
          python3 -m pip install pyinstaller

      # NOTE: Remove this step if/once libxft gets updated to 2.3.5 or newer on Ubuntu 22.04, which currently has 2.3.4.
      - name: Build a recent version of libXft
        run: |
          mkdir -p /tmp/libXft
          cd /tmp/libXft
          curl -fL https://xorg.freedesktop.org/releases/individual/lib/libXft-2.3.9.tar.xz -o libXft.tar.xz
          sha256sum libXft.tar.xz
          tar xvf libXft.tar.xz
          cd libXft-*
          ./configure --prefix=/tmp/libXft --sysconfdir=/etc --disable-static
          make
          make install-strip

      - name: Create portable executable
        run: |
          LD_LIBRARY_PATH=/tmp/libXft/lib xvfb-run --auto-servernum pyinstaller build.spec

      - name: Show PyInstaller warnings
        run: |
          cat build/build/warn-build.txt || true

      - name: Create release folder
        run: |
          folder='DropForge'
          mkdir "${folder}"
          cp manual.txt dist/* "${folder}"
          7z a 'DropForge.Linux.PyInstaller-${{matrix.arch}}.zip' "${folder}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: DropForge.Linux.PyInstaller-${{matrix.arch}}
          path: DropForge.Linux.PyInstaller-${{matrix.arch}}.zip

  linux-appimage:
    name: Linux (AppImage) (${{matrix.arch}})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{matrix.runner}}
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: |
          echo "app_version=$(python3 -c 'from version import __version__ as v; print(v)')" >> "${GITHUB_OUTPUT}"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Append git revision to project version
        run: |
          sed -ri "s/^__version__\s*=\s*\"[^\"]+/\0.${{steps.vars.outputs.sha_short}}/" version.py

      - name: Install system dependencies
        run: |
          sudo sed -i -e 's|http://archive.ubuntu.com|https://archive.ubuntu.com|g' -e 's|http://ports.ubuntu.com|https://ports.ubuntu.com|g' -e 's|http://security.ubuntu.com|https://security.ubuntu.com|g' /etc/apt/sources.list
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y libgirepository1.0-dev gir1.2-ayatanaappindicator3-0.1 libayatana-appindicator3-1

      - name: Install appimage-builder
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install wheel
          python3 -m pip install setuptools setuptools_scm
          # TODO: Switch to a stable release if/when a version newer than 1.1.0 is released.
          python3 -m pip install git+https://github.com/AppImageCrafters/appimage-builder.git@1a8794d3c89f288fbd82b9accd7c0b74611147d5

      - name: Create AppImage
        env:
          ARCH: ${{matrix.arch}}
          ARCH_APT: ${{matrix.arch == 'x86_64' && 'amd64' || 'arm64'}}
          APP_VERSION: ${{steps.vars.outputs.app_version}}.${{steps.vars.outputs.sha_short}}
          PYTHON_VERSION: ${{env.PYTHON_VERSION}}
        run: |
          appimage-builder --recipe appimage/AppImageBuilder.yml

      - name: Create release folder
        run: |
          folder='DropForge'
          mkdir "${folder}"
          cp *.AppImage manual.txt "${folder}"
          7z a 'DropForge.Linux.AppImage-${{matrix.arch}}.zip' "${folder}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: DropForge.Linux.AppImage-${{matrix.arch}}
          path: DropForge.Linux.AppImage-${{matrix.arch}}.zip

  update_releases_page:
    name: Upload builds to Releases
    if: github.event_name != 'pull_request'
    needs:
      - windows
      - web
      - linux-pyinstaller
      - linux-appimage
      - linux-tui
      - macos
      - macos-tui
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: |
          echo "date_now=$(date --rfc-3339=seconds)" >> "${GITHUB_OUTPUT}"
          echo "app_version=$(python3 -c 'from version import __version__ as v; print(v)')" >> "${GITHUB_OUTPUT}"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Download build artifacts from previous jobs
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create a new release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: artifacts/*/*
          body: |
            **DropForge Release**

            - Build date: `${{steps.vars.outputs.date_now}}`
            - Reference commit: ${{github.sha}}

            **Linux server or CLI install**

            Linux:

            ```sh
            curl -fsSL https://raw.githubusercontent.com/HimanM/TwitchDropsMiner/main/scripts/install.sh | sh
            ```

            Choose the authenticated DropForge Web UI or terminal CLI when prompted. Web installs default to localhost on port `17473`; use Tailscale Serve for private remote access or explicitly select `0.0.0.0` for a trusted LAN.

            macOS uses the same command and installs the terminal release.

            On Termux, install prerequisites first:

            ```sh
            pkg install python clang curl tar
            ```

            Run `tdminer tui` for the richer macOS Textual interface, or `tdminer cli` for the portable prompt-based interface used by source installs and Termux-style terminals.

            The portable CLI includes a boxed slash-command input. Type `/` for commands, `/priority add ` or `/exclude add ` for game completion, and `/switch ` for channel completion.

            The Linux installer manages source releases, dependencies, systemd, and persistent data under `~/.local/share/tdminer`. The macOS release binary is self-contained. Launchers install to `~/.local/bin` by default and can be redirected with `TDMINER_INSTALL_DIR=/path/to/bin`.

          name: "Release v${{steps.vars.outputs.app_version}}"
          prerelease: false
          removeArtifacts: true
          tag: "v${{steps.vars.outputs.app_version}}"
